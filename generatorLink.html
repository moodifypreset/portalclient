<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X STUDIO - Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #09090b; color: #fafafa; }
        .glass-panel { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8 selection:bg-zinc-700">

    <div class="glass-panel max-w-3xl w-full rounded-2xl shadow-2xl overflow-hidden p-8 md:p-12 relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-zinc-800 via-zinc-400 to-zinc-800"></div>
        
        <div class="text-center mb-10">
            <h1 class="text-3xl font-light tracking-widest uppercase mb-2">X Studio</h1>
            <p class="text-xs text-zinc-500 tracking-[0.2em]">Secure Link Generator</p>
        </div>

        <input type="hidden" id="baseUrl">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div>
                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Nama Klien</label>
                <input type="text" id="clientName" placeholder="Contoh: Raka & Sisil"
                    class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-lg focus:border-zinc-400 focus:ring-1 focus:ring-zinc-400 outline-none transition text-sm">
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Kategori Sesi</label>
                <input type="text" id="categoryName" placeholder="Contoh: Wedding"
                    class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-lg focus:border-zinc-400 outline-none transition text-sm">
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Tanggal Sesi</label>
                <input type="date" id="dateInfo"
                    class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-lg focus:border-zinc-400 outline-none transition text-sm text-zinc-300 [color-scheme:dark]">
            </div>

            <div>
                <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Batas Kuota Foto</label>
                <input type="number" id="kuota" placeholder="Kosongkan jika unlimited"
                    class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-lg focus:border-zinc-400 outline-none transition text-sm">
            </div>
        </div>

        <div class="mb-10">
            <label class="block text-[10px] font-semibold text-zinc-400 uppercase tracking-widest mb-2">Link Folder Google Drive</label>
            <input type="text" id="driveLink" placeholder="Paste link G-Drive di sini..."
                class="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-lg focus:border-zinc-400 outline-none transition text-sm">
        </div>

        <button onclick="generateLink()" class="w-full py-4 bg-zinc-100 hover:bg-white text-zinc-900 font-bold uppercase tracking-widest text-xs rounded-lg transition shadow-lg">
            Generate Secure Link
        </button>

        <div id="resultBox" class="hidden mt-8 pt-8 border-t border-zinc-800 text-center">
            <p class="text-[10px] text-zinc-400 uppercase tracking-widest mb-4">Link Klien Siap Dikirim</p>
            <div class="bg-zinc-900 border border-zinc-700 rounded-lg p-4 mb-4 overflow-x-auto text-left">
                <code id="displayUrl" class="text-sm font-medium text-zinc-300 whitespace-nowrap"></code>
            </div>
            <button onclick="copyToClipboard()" class="px-8 py-3 bg-zinc-800 hover:bg-zinc-700 text-white text-xs uppercase tracking-widest font-bold rounded-lg transition border border-zinc-600">
                Salin Link
            </button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let currentUrl = window.location.href.split('?')[0].split('#')[0];
            let portalUrl = currentUrl.includes("generatorLink.html") ? 
                            currentUrl.replace("generatorLink.html", "") : 
                            currentUrl.substring(0, currentUrl.lastIndexOf("/") + 1);
            document.getElementById('baseUrl').value = portalUrl;
        });

        function extractFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
            if (match && match[1]) return match[1];
            const matchId = url.match(/id=([a-zA-Z0-9-_]+)/);
            return matchId && matchId[1] ? matchId[1] : null;
        }

        function generateLink() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const clientName = document.getElementById('clientName').value.trim();
            const categoryName = document.getElementById('categoryName').value.trim();
            const dateInfo = document.getElementById('dateInfo').value;
            const kuota = document.getElementById('kuota').value.trim();
            const driveLink = document.getElementById('driveLink').value.trim();

            if (!driveLink) return alert('Link Google Drive wajib diisi!');
            const folderId = extractFolderId(driveLink);
            if (!folderId) return alert('Link Google Drive tidak valid!');

            // Menyusun format nama klien untuk URL (contoh: Raka-Sisil)
            let cleanName = clientName.replace(/[^a-zA-Z0-9]/g, '-').replace(/-+/g, '-');
            
            // Menggabungkan data rahasia dengan pemisah |
            // Format: folderId|kuota|tanggal|kategori
            const payload = `${folderId}|${kuota || ''}|${dateInfo || ''}|${categoryName || ''}`;
            const secureToken = btoa(unescape(encodeURIComponent(payload))); // Enkripsi Base64 yang aman

            let base = baseUrl.endsWith('/') ? baseUrl : baseUrl + '/';
            const finalUrl = `${base}?klien=${cleanName}&_k=${secureToken}`;

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('displayUrl').textContent = finalUrl;
        }

        function copyToClipboard() {
            const finalUrl = document.getElementById('displayUrl').textContent;
            navigator.clipboard.writeText(finalUrl).then(() => {
                alert('Tautan berhasil disalin!');
            }).catch(() => {
                alert('Gagal menyalin. Silakan copy manual teks di dalam kotak.');
            });
        }
    </script>
</body>
</html>
