<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Auto Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white max-w-xl w-full rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 px-6 py-5 flex items-center gap-4">
            <div class="bg-white/20 text-white w-10 h-10 rounded-xl flex items-center justify-center text-lg">
                <i class="fa-solid fa-link"></i>
            </div>
            <div>
                <h1 class="font-bold text-white text-lg">Auto Link Generator</h1>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Admin Tool</p>
            </div>
        </div>

        <div class="p-6 md:p-8 space-y-5">
            
            <!-- Input 1: Base URL (Terisi Otomatis) -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">1. Alamat Website Portal (Auto-Detect)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-globe text-slate-400"></i>
                    </div>
                    <input type="text" id="baseUrl" 
                        class="w-full pl-10 pr-4 py-3 bg-slate-100 border border-slate-200 rounded-xl outline-none text-sm text-slate-600 focus:ring-2 focus:ring-blue-600 transition">
                </div>
                <p class="text-[11px] text-slate-500 mt-1"><i class="fa-solid fa-magic text-blue-500 mr-1"></i> Sistem otomatis mendeteksi lokasi file <b>index.html</b> di server Anda.</p>
            </div>

            <!-- Input 2: Nama Klien -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">2. Nama Klien / Project</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user-tag text-slate-400"></i>
                    </div>
                    <input type="text" id="clientName" placeholder="Contoh: Raka & Sisil Wedding"
                        class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-600 outline-none transition text-sm">
                </div>
            </div>

            <!-- Input 3: Link Drive -->
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">3. Link Google Drive</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-brands fa-google-drive text-slate-400"></i>
                    </div>
                    <input type="text" id="driveLink" placeholder="Paste link folder di sini..."
                        class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-600 outline-none transition text-sm">
                </div>
            </div>

            <button onclick="generateLink()" class="w-full py-4 mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition flex items-center justify-center gap-2 shadow-lg">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Buat Link & Salin
            </button>

            <div id="resultBox" class="hidden mt-4 bg-green-50 border border-green-200 rounded-xl p-4 transition-all">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-green-700 uppercase tracking-wider">Berhasil Dibuat!</span>
                </div>
                <textarea id="finalUrl" readonly class="w-full bg-white border border-green-200 rounded-lg p-3 text-sm text-slate-700 outline-none resize-none h-24 font-mono"></textarea>
                <button onclick="copyToClipboard()" class="mt-3 w-full py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg transition">
                    Salin ke WhatsApp
                </button>
            </div>

        </div>
    </div>

    <!-- Alert Notifikasi -->
    <div id="customAlert" class="fixed top-4 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-3 transition-all duration-300 transform -translate-y-32 opacity-0">
        <i id="alertIcon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="alertText" class="text-sm font-bold">Link tersalin!</span>
    </div>

    <script>
        // Fitur Auto-Detect URL saat halaman dimuat
        document.addEventListener("DOMContentLoaded", () => {
            // Ambil URL saat ini (tanpa parameter atau hash)
            let currentUrl = window.location.href.split('?')[0].split('#')[0];
            let portalUrl = "";
            
            // Asumsi file generator bernama admin-generator.html
            // Kita otomatis mengganti nama file tersebut menjadi index.html (File portal klien)
            if (currentUrl.includes("admin-generator.html")) {
                portalUrl = currentUrl.replace("admin-generator.html", "index.html");
            } else {
                // Fallback jika nama file diubah oleh admin
                const lastSlash = currentUrl.lastIndexOf("/");
                portalUrl = currentUrl.substring(0, lastSlash + 1) + "index.html";
            }
            
            // Masukkan ke kolom input
            document.getElementById('baseUrl').value = portalUrl;
        });

        function showAlert(message) {
            const alertBox = document.getElementById('customAlert');
            document.getElementById('alertText').textContent = message;
            alertBox.classList.remove('-translate-y-32', 'opacity-0');
            setTimeout(() => alertBox.classList.add('-translate-y-32', 'opacity-0'), 3000);
        }

        function generateLink() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const clientName = document.getElementById('clientName').value.trim();
            const driveLink = document.getElementById('driveLink').value.trim();

            if (!baseUrl || !driveLink) return alert('Website Portal dan Link Drive wajib diisi!');

            // Encode data agar format link aman
            const encodedDrive = encodeURIComponent(driveLink);
            let finalUrl = `${baseUrl}?link=${encodedDrive}`;
            
            // Tambahkan parameter nama jika admin mengisinya
            if (clientName) {
                const encodedName = encodeURIComponent(clientName);
                finalUrl += `&nama=${encodedName}`;
            }

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('finalUrl').value = finalUrl;
            copyToClipboard(finalUrl);
        }

        function copyToClipboard(text = null) {
            const finalUrl = text || document.getElementById('finalUrl').value;
            if (!finalUrl) return;
            navigator.clipboard.writeText(finalUrl).then(() => showAlert('Link berhasil disalin!')).catch(() => {
                document.getElementById('finalUrl').select();
                document.execCommand('copy');
                showAlert('Link berhasil disalin!');
            });
        }
    </script>
</body>
</html>
