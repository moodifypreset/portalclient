<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Auto Link Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white max-w-xl w-full rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 px-6 py-5 flex items-center gap-4">
            <div class="bg-white/20 text-white w-10 h-10 rounded-xl flex items-center justify-center text-lg shadow-inner">
                <i class="fa-solid fa-link"></i>
            </div>
            <div>
                <h1 class="font-bold text-white text-lg">Auto Link Generator</h1>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Ultra-Short URL Builder</p>
            </div>
        </div>

        <div class="p-6 md:p-8 space-y-5">
            
            <div class="hidden">
                <input type="text" id="baseUrl">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">1. Nama Klien (Tanpa Spasi Lebih Baik)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user-tag text-slate-400"></i>
                    </div>
                    <input type="text" id="clientName" placeholder="Contoh: Jimmy-Josephine"
                        class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-600 outline-none transition text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">2. Link Google Drive</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-brands fa-google-drive text-slate-400"></i>
                    </div>
                    <input type="text" id="driveLink" placeholder="Paste link folder di sini..."
                        class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-600 outline-none transition text-sm">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">3. Batas Kuota (Opsional)</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-chart-pie text-slate-400"></i>
                    </div>
                    <input type="number" id="kuota" placeholder="Contoh: 50"
                        class="w-full pl-10 pr-4 py-3 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-600 outline-none transition text-sm">
                </div>
            </div>

            <button onclick="generateLink()" class="w-full py-4 mt-2 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition flex items-center justify-center gap-2 shadow-lg">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Buat Link Super Ringkas
            </button>

            <div id="resultBox" class="hidden mt-4 bg-green-50 border border-green-200 rounded-xl p-4 transition-all">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-green-700 uppercase tracking-wider">Berhasil Dibuat!</span>
                </div>
                <textarea id="finalUrl" readonly class="w-full bg-white border border-green-200 rounded-lg p-3 text-sm text-slate-700 outline-none resize-none h-24 font-mono font-medium shadow-inner"></textarea>
                <button onclick="copyToClipboard()" class="mt-3 w-full py-3 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-xl transition flex justify-center items-center gap-2 shadow-md">
                    <i class="fa-brands fa-whatsapp text-lg"></i> Salin ke WhatsApp
                </button>
            </div>

        </div>
    </div>

    <div id="customAlert" class="fixed top-4 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl z-50 flex items-center gap-3 transition-all duration-300 transform -translate-y-32 opacity-0">
        <i id="alertIcon" class="fa-solid fa-circle-check text-green-400"></i>
        <span id="alertText" class="text-sm font-bold">Link tersalin!</span>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let currentUrl = window.location.href.split('?')[0].split('#')[0];
            let portalUrl = currentUrl.includes("generatorLink.html") ? 
                            currentUrl.replace("generatorLink.html", "") : 
                            currentUrl.substring(0, currentUrl.lastIndexOf("/") + 1);
            document.getElementById('baseUrl').value = portalUrl;
        });

        function showAlert(message, isError = false) {
            const alertBox = document.getElementById('customAlert');
            document.getElementById('alertText').textContent = message;
            document.getElementById('alertIcon').className = isError ? "fa-solid fa-triangle-exclamation text-red-400" : "fa-solid fa-circle-check text-green-400";
            alertBox.classList.remove('-translate-y-32', 'opacity-0');
            setTimeout(() => alertBox.classList.add('-translate-y-32', 'opacity-0'), 3000);
        }

        function extractFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
            if (match && match[1]) return match[1];
            const matchId = url.match(/id=([a-zA-Z0-9-_]+)/);
            return matchId && matchId[1] ? matchId[1] : null;
        }

        function getTodayFormatted() {
            const date = new Date();
            const day = String(date.getDate()).padStart(2, '0');
            const months = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
            return `${day}-${months[date.getMonth()]}-${date.getFullYear()}`;
        }

        function generateLink() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const clientName = document.getElementById('clientName').value.trim();
            const driveLink = document.getElementById('driveLink').value.trim();
            const kuota = document.getElementById('kuota').value.trim();

            if (!driveLink) return alert('Link Google Drive wajib diisi!');

            const folderId = extractFolderId(driveLink);
            if (!folderId) return showAlert('Link Google Drive tidak valid!', true);

            let finalUrl = baseUrl.endsWith('/') ? baseUrl : baseUrl + '/';
            let params = [];
            
            // Format Nama + Tanggal (Parameter 'n')
            let finalName = clientName ? `${clientName.replace(/\s+/g, '-')}-${getTodayFormatted()}` : `Klien-${getTodayFormatted()}`;
            params.push(`n=${encodeURIComponent(finalName)}`);
            
            // Kuota (Parameter 'q')
            if (kuota && parseInt(kuota) > 0) params.push(`q=${parseInt(kuota)}`);
            
            // ID Drive (Parameter 'i')
            params.push(`i=${folderId}`);
            
            finalUrl += '?' + params.join('&');

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('finalUrl').value = finalUrl;
            copyToClipboard(finalUrl);
        }

        function copyToClipboard() {
            const finalUrl = document.getElementById('finalUrl').value;
            if (!finalUrl) return;
            navigator.clipboard.writeText(finalUrl).then(() => showAlert('Link berhasil disalin!')).catch(() => {
                document.getElementById('finalUrl').select();
                document.execCommand('copy');
                showAlert('Link berhasil disalin!');
            });
        }
    </script>
</body>
</html>
