<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generator Link MemoryKita (KV Database)</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
    input, button { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; }
    button { background-color: #0070f3; color: white; border: none; cursor: pointer; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    #hasilLink { word-break: break-all; background: #f0f0f0; padding: 10px; border-radius: 5px; display: none; }
    #statusTeks { color: #0070f3; font-size: 14px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

  <h2>Buat Link Klien</h2>
  
  <label>Nama Klien:</label>
  <input type="text" id="inputNama" placeholder="Contoh: Deni" required>

  <label>ID Folder Google Drive:</label>
  <input type="text" id="inputIdDrive" placeholder="Contoh: 1KS42_TUk5yaCewaAeY..." required>

  <label>Kuota Foto (Jumlah):</label>
  <input type="number" id="inputKuota" placeholder="Contoh: 50" required>

  <p id="statusTeks">Menyimpan ke database...</p>
  <button id="tombolGenerate" onclick="buatLink()">Generate Link</button>

  <div id="hasilLink">
    <p><strong>Link berhasil dibuat!</strong></p>
    <a id="linkUrl" href="#" target="_blank"></a>
  </div>

  <script>
    async function buatLink() {
      // 1. Ambil data dari form
      const namaMentah = document.getElementById('inputNama').value.trim();
      const idDrive = document.getElementById('inputIdDrive').value.trim();
      const kuota = document.getElementById('inputKuota').value.trim();

      if (!namaMentah || !idDrive || !kuota) {
        alert("Harap isi semua kolom!");
        return;
      }

      // 2. Buat ID Client unik (Gabungan Nama Tanpa Spasi + Tanggal Hari Ini)
      // Contoh: Deni12072026
      const namaBeresih = namaMentah.replace(/\s+/g, '');
      const hariIni = new Date();
      const tgl = String(hariIni.getDate()).padStart(2, '0');
      const bln = String(hariIni.getMonth() + 1).padStart(2, '0');
      const thn = hariIni.getFullYear();
      
      const idClient = `${namaBeresih}${tgl}${bln}${thn}`;

      // Tampilan Loading
      const tombol = document.getElementById('tombolGenerate');
      const status = document.getElementById('statusTeks');
      tombol.disabled = true;
      status.style.display = "block";

      try {
        // 3. Kirim data ke API Vercel KV (/api/save)
        const response = await fetch('/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idClient, idDrive, kuota })
        });

        const result = await response.json();

        if (response.ok) {
          // 4. Jika sukses simpan, tampilkan Link
          const domainAsli = window.location.origin; 
          const urlAkhir = `${domainAsli}/?client=${idClient}`;

          const tempatHasil = document.getElementById('hasilLink');
          const elemenLink = document.getElementById('linkUrl');
          
          elemenLink.href = urlAkhir;
          elemenLink.innerText = urlAkhir;
          tempatHasil.style.display = "block";
        } else {
          alert("Gagal menyimpan: " + (result.error || "Kesalahan server"));
        }
      } catch (error) {
        alert("Terjadi kesalahan jaringan atau API tidak ditemukan.");
        console.error(error);
      } finally {
        // Kembalikan tombol ke semula
        tombol.disabled = false;
        status.style.display = "none";
      }
    }
  </script>

</body>
</html>
