<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Gallery Baru - X Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="bg-white max-w-3xl w-full rounded-3xl shadow-xl border border-slate-100 overflow-hidden p-8 md:p-10">
        
        <div class="mb-8 border-b border-slate-100 pb-4">
            <h1 class="font-bold text-slate-800 text-2xl">Buat Gallery Baru</h1>
            <p class="text-slate-500 text-sm mt-1">Smart URL Masking Tool</p>
        </div>

        <!-- Input Tersembunyi untuk URL Portal -->
        <input type="hidden" id="baseUrl">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Nama Klien -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nama Client</label>
                <input type="text" id="clientName" placeholder="Contoh: hihi"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 outline-none transition text-sm font-medium text-slate-800">
            </div>

            <!-- Universitas / Kategori -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Universitas / Kategori</label>
                <input type="text" id="univName" placeholder="Contoh: uin"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 outline-none transition text-sm font-medium text-slate-800">
            </div>

            <!-- Tanggal -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Tanggal</label>
                <input type="date" id="dateInfo"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 outline-none transition text-sm font-medium text-slate-800 cursor-pointer">
            </div>

            <!-- Kuota -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Jumlah Pilihan (Kuota)</label>
                <input type="number" id="kuota" placeholder="0"
                    class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 outline-none transition text-sm font-medium text-slate-800">
            </div>
        </div>

        <!-- Link Google Drive -->
        <div class="mb-8">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Link Google Drive</label>
            <input type="text" id="driveLink" placeholder="https://drive.google.com/..."
                class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-slate-800 outline-none transition text-sm font-medium text-slate-800">
        </div>

        <button onclick="generateLink()" class="w-full py-4 bg-slate-900 hover:bg-black text-white font-bold rounded-xl transition shadow-lg flex items-center justify-center gap-2">
            Generate Link
        </button>

        <!-- Hasil Link -->
        <div id="resultBox" class="hidden mt-6 bg-slate-50 border border-slate-200 rounded-2xl p-5 transition-all text-center">
            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Link Premium Berhasil Dibuat!</p>
            <div class="bg-white border border-slate-200 rounded-xl p-3 mb-4 overflow-x-auto">
                <code id="displayUrl" class="text-sm font-bold text-slate-800 whitespace-nowrap"></code>
            </div>
            <!-- Input tersembunyi berisi URL lengkap beserta hash datanya -->
            <input type="hidden" id="finalUrl">
            
            <button onclick="copyToClipboard()" class="px-8 py-2.5 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg transition shadow-md inline-flex items-center gap-2">
                Salin Link
            </button>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let currentUrl = window.location.href.split('?')[0].split('#')[0];
            let portalUrl = currentUrl.includes("generatorLink.html") ? 
                            currentUrl.replace("generatorLink.html", "") : 
                            currentUrl.substring(0, currentUrl.lastIndexOf("/") + 1);
            document.getElementById('baseUrl').value = portalUrl;
        });

        function extractFolderId(url) {
            const match = url.match(/folders\/([a-zA-Z0-9-_]+)/);
            if (match && match[1]) return match[1];
            const matchId = url.match(/id=([a-zA-Z0-9-_]+)/);
            return matchId && matchId[1] ? matchId[1] : null;
        }

        function generateLink() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const clientName = document.getElementById('clientName').value.trim().toLowerCase();
            const univName = document.getElementById('univName').value.trim().toLowerCase();
            const dateInfo = document.getElementById('dateInfo').value;
            const kuota = document.getElementById('kuota').value.trim();
            const driveLink = document.getElementById('driveLink').value.trim();

            if (!driveLink) return alert('Link Google Drive wajib diisi!');
            const folderId = extractFolderId(driveLink);
            if (!folderId) return alert('Link Google Drive tidak valid!');

            // Membentuk nama URL cantik (misal: hihi-uin)
            let cleanUrlName = '';
            if (clientName && univName) cleanUrlName = `${clientName}-${univName}`;
            else if (clientName) cleanUrlName = clientName;
            
            cleanUrlName = cleanUrlName.replace(/\s+/g, '-'); // Ganti spasi dengan strip

            // Menyusun Data Rahasia
            const payload = {
                id: folderId,
                q: kuota ? parseInt(kuota) : null,
                d: dateInfo || null
            };
            
            // Enkripsi ringan data menjadi format Base64
            const secretData = btoa(JSON.stringify(payload));

            // Merakit URL Final
            let base = baseUrl.endsWith('/') ? baseUrl : baseUrl + '/';
            
            // Tampilan URL yang akan dikopi lengkap dengan Hash tersembunyinya
            const finalFullUrl = `${base}?${cleanUrlName}#_d=${secretData}`;
            
            // Tampilan "Palsu" (Clean) untuk ditunjukkan di layar admin
            const cleanDisplayUrl = `${base}?${cleanUrlName}`;

            document.getElementById('resultBox').classList.remove('hidden');
            document.getElementById('displayUrl').textContent = cleanDisplayUrl;
            document.getElementById('finalUrl').value = finalFullUrl;
        }

        function copyToClipboard() {
            const finalUrl = document.getElementById('finalUrl').value;
            navigator.clipboard.writeText(finalUrl).then(() => {
                alert('Tautan disalin! Klien akan melihat link ini menjadi sangat pendek saat diklik.');
            }).catch(() => {
                const tempInput = document.createElement("input");
                tempInput.value = finalUrl;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                alert('Tautan berhasil disalin!');
            });
        }
    </script>
</body>
</html>
