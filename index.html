<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galeri Klien MemoryKita</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px 20px; }
    .kartu { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #tampilanLoading { color: #0070f3; }
    #tampilanError { color: red; display: none; }
    #tampilanData { display: none; }
  </style>
</head>
<body>

  <div class="kartu">
    <!-- Status memuat saat mengambil data dari database -->
    <div id="tampilanLoading">
      <p>Mencari data klien...</p>
    </div>

    <!-- Bagian ini muncul jika ID tidak ada di database -->
    <div id="tampilanError">
      <h2>Akses Ditolak</h2>
      <p>Link tidak valid, rusak, atau data klien tidak ditemukan.</p>
    </div>

    <!-- Bagian ini muncul jika data sukses diambil dari database -->
    <div id="tampilanData">
      <h2>Halo, <span id="teksNama"></span>!</h2>
      <p>Selamat datang di galeri foto kamu.</p>
      <hr>
      <p><strong>Sisa Kuota Pilihan:</strong> <span id="teksKuota"></span> Foto</p>
      
      <button id="tombolDrive" style="padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">
        Buka Folder Drive
      </button>
    </div>
  </div>

  <script>
    // 1. Tangkap parameter '?client=' dari URL (Contoh: ?client=Deni12072026)
    const urlParams = new URLSearchParams(window.location.search);
    const idClient = urlParams.get('client');

    const tampilanLoading = document.getElementById('tampilanLoading');
    const tampilanError = document.getElementById('tampilanError');
    const tampilanData = document.getElementById('tampilanData');

    if (idClient) {
      // 2. Minta data ke backend API (/api/get)
      fetch(`/api/get?client=${idClient}`)
        .then(response => {
          if (!response.ok) throw new Error("Data tidak ditemukan");
          return response.json();
        })
        .then(data => {
          // Hilangkan teks loading
          tampilanLoading.style.display = "none";

          // 3. Masukkan data dari Vercel KV ke HTML
          // Mengambil nama asli dari idClient (menghapus angka tanggal di belakang)
          const namaAsli = idClient.replace(/[0-9]/g, ''); 
          
          document.getElementById('teksNama').innerText = namaAsli;
          document.getElementById('teksKuota').innerText = data.kuota;
          
          document.getElementById('tombolDrive').onclick = function() {
            window.open(`https://drive.google.com/drive/folders/${data.idDrive}`, '_blank');
          };

          tampilanData.style.display = "block";
        })
        .catch(error => {
          // Jika API gagal atau ID tidak ada di database
          tampilanLoading.style.display = "none";
          tampilanError.style.display = "block";
          console.error("Error:", error);
        });
    } else {
      // Jika URL dibuka tanpa parameter ?client=
      tampilanLoading.style.display = "none";
      tampilanError.style.display = "block";
    }
  </script>

</body>
</html>
